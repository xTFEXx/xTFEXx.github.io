<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herramientas y demás xTFEXx</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Variables de colores oscuros */
        :root {
            --bg-page: #0b1121;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-desc: #94a3b8;
            --accent-blue: #38bdf8;
            --accent-hover: #7dd3fc;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            padding: 20px; 
            background-color: var(--bg-page); 
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        h1 {
            color: #ffffff;
            text-align: center;
            margin-bottom: 1.5rem;
            margin-top: 2rem;
        }

        /* Contenedor del buscador */
        .search-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px 14px 45px;
            border-radius: 30px;
            border: 2px solid #1e293b;
            background: #1e293b;
            color: #f8fafc;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .search-box:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        .search-box::placeholder {
            color: #64748b;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
        }

        /* Contenedor tipo grilla para los cuadros */
        .repo-list { 
            list-style-type: none; 
            padding: 0; 
            width: 100%;
            max-width: 1000px; 
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .repo-item { 
            background: var(--bg-card); 
            padding: 20px; 
            border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 3px solid var(--accent-blue);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s;
        }

        .repo-item:hover {
            transform: translateY(-3px);
        }

        .repo-item a { 
            text-decoration: none; 
            color: var(--accent-blue); 
            font-weight: 700; 
            font-size: 1.2rem; 
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        .repo-item a:hover { 
            color: var(--accent-hover);
        }

        .repo-desc { 
            margin: 12px 0 0 0; 
            color: var(--text-desc); 
            font-size: 0.95rem; 
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            flex-grow: 1;
        }

        .badge { 
            display: inline-block; 
            background: rgba(56, 189, 248, 0.15); 
            color: var(--accent-blue); 
            font-size: 0.75rem; 
            font-weight: 600;
            padding: 4px 10px; 
            border-radius: 12px; 
            margin-bottom: 12px;
            width: max-content;
        }

        #mensaje-estado {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h1>Herramientas y demás xTFEXx</h1>

    <div class="search-container">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="buscador" class="search-box" placeholder="Buscar página por nombre...">
    </div>

    <div id="mensaje-estado">Buscando páginas publicadas...</div>
    <ul id="lista-repos" class="repo-list"></ul>

    <script>
        const usuarioGitHub = 'xtfexx'; 
        const urlAPI = `https://api.github.com/users/${usuarioGitHub}/repos?per_page=100`;
        
        let reposActivos = []; // Array para guardar las páginas y poder filtrarlas

        // Función para renderizar los cuadros en la pantalla
        function mostrarRepositorios(repos) {
            const contenedorLista = document.getElementById('lista-repos');
            const mensajeEstado = document.getElementById('mensaje-estado');
            
            contenedorLista.innerHTML = ''; 

            if (repos.length === 0) {
                mensajeEstado.style.display = 'block';
                mensajeEstado.textContent = 'No se encontraron páginas con ese nombre.';
                return;
            }

            mensajeEstado.style.display = 'none';

            repos.forEach(repo => {
                const elementoLi = document.createElement('li');
                elementoLi.className = 'repo-item';

                const etiqueta = document.createElement('span');
                etiqueta.className = 'badge';
                etiqueta.textContent = 'En vivo';
                elementoLi.appendChild(etiqueta);

                const enlace = document.createElement('a');
                let nombreMostrar = repo.name; // Usamos el nombre exacto de la ruta por defecto
                
                // Excepción para la página principal
                if (repo.name.toLowerCase() === `${usuarioGitHub.toLowerCase()}.github.io`) {
                    enlace.href = `https://${usuarioGitHub}.github.io/`;
                    nombreMostrar = "Página Principal";
                } else {
                    enlace.href = `https://${usuarioGitHub}.github.io/${repo.name}/`;
                }
                
                enlace.textContent = nombreMostrar;
                enlace.target = '_blank'; 

                const descripcion = document.createElement('p');
                descripcion.className = 'repo-desc';
                descripcion.textContent = repo.description ? repo.description : 'Herramienta web activa.';

                elementoLi.appendChild(enlace);
                elementoLi.appendChild(descripcion);
                contenedorLista.appendChild(elementoLi);
            });
        }

        // Obtener datos de la API
        fetch(urlAPI)
            .then(respuesta => respuesta.json())
            .then(datos => {
                const mensajeEstado = document.getElementById('mensaje-estado');
                
                // Filtramos: solo proyectos que no sean forks y tengan Pages activado
                reposActivos = datos.filter(repo => !repo.fork && repo.has_pages);

                // Ordenamos alfabéticamente (A-Z)
                reposActivos.sort((a, b) => a.name.localeCompare(b.name));

                if (reposActivos.length === 0) {
                    mensajeEstado.textContent = 'Aún no se encontraron páginas activas en esta cuenta.';
                } else {
                    mostrarRepositorios(reposActivos);
                }
            })
            .catch(error => {
                console.error('Error al cargar:', error);
                document.getElementById('mensaje-estado').innerHTML = '<span style="color: #ef4444;">Error de conexión con GitHub.</span>';
            });

        // Lógica del buscador en tiempo real
        document.getElementById('buscador').addEventListener('input', (e) => {
            const termino = e.target.value.toLowerCase();
            
            // Filtra si el nombre del repositorio incluye lo que escribiste
            const filtrados = reposActivos.filter(repo => {
                // Si es la principal, permitimos buscarla también por "página principal"
                if (repo.name.toLowerCase() === `${usuarioGitHub.toLowerCase()}.github.io`) {
                    return "página principal".includes(termino) || repo.name.toLowerCase().includes(termino);
                }
                return repo.name.toLowerCase().includes(termino);
            });

            mostrarRepositorios(filtrados);
        });
    </script>

</body>
</html>
