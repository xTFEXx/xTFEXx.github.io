<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Proyectos xTFEXx</title>
    
    <link rel="icon" href="./íconos/favicon.png?v=1" type="image/png">

    <style>
        /* Variables de colores futuristas */
        :root {
            --bg-color: #0b0c10;
            --neon-blue: #45f3ff;
            --neon-purple: #b026ff;
            --neon-pink: #ff2a85;
            --neon-cyan: #00fa9a;
            --glass-bg: rgba(255, 255, 255, 0.08); 
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Bloqueo estricto del root para que la barra de direcciones de celular NO se oculte */
        html, body {
            scrollbar-width: none; 
            -ms-overflow-style: none; 
            overflow: hidden; /* Esto bloquea el salto de la barra */
            height: 100%; width: 100%;
        }
        
        html::-webkit-scrollbar, body::-webkit-scrollbar {
            display: none; 
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #fff;
            
            animation: systemBoot 1s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
            opacity: 0;

            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        @keyframes systemBoot {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* --- NUEVA CÁPSULA DE SCROLL INTERNO --- */
        /* Todo el contenido se escrolea aquí adentro, manteniendo el fondo intacto */
        .main-scroll-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            scrollbar-width: none;
        }

        .main-scroll-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* --- NUEVO FONDO: ORBS SÓLIDAS Y BRILLANTES --- */
        #background-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            overflow: hidden;
            pointer-events: none;
            background: var(--bg-color);
        }

        .orb {
            position: absolute;
            top: 0; left: 0;
            border-radius: 50%;
            /* Físicas nítidas y brillantes sin usar el costoso blur */
            will-change: transform;
            /* El truco de la nítidez y el destello */
            filter: drop-shadow(0 0 5px currentColor);
        }

        /* Colores Sólidos con efecto de Luz Neón */
        #orb1 { background-color: rgb(176, 38, 255); color: rgb(210, 100, 255); }
        #orb2 { background-color: rgb(69, 243, 255); color: rgb(150, 250, 255); }
        #orb3 { background-color: rgb(255, 42, 133); color: rgb(255, 120, 180); }
        #orb4 { background-color: rgb(0, 250, 154); color: rgb(100, 255, 200); }

        /* Tinte oscuro que actúa como cristal, sin backdrop-filter: blur */
        .tint-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(11, 12, 16, 0.3);
            z-index: -1;
            pointer-events: none;
        }

        /* ------------------------------------------------------------------------ */

        header {
            margin-top: 50px;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            text-transform: none; 
            letter-spacing: 5px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            
            /* LA MAGIA DEL FILTRO: Interacciona nítidamente con la luz sólida del fondo */
            mix-blend-mode: difference;
            animation: titleSmoothIn 1.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards 0.2s;
        }

        @keyframes titleSmoothIn {
            0% { opacity: 0; transform: translateY(-30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ----- BARRA DE BÚSQUEDA ----- */
        .search-wrapper {
            position: relative;
            margin: 0 auto;
            width: 50px;
            height: 50px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            overflow: hidden;
            box-shadow: 0 0 15px rgba(69, 243, 255, 0.1);
            box-sizing: border-box; 
            transition: width 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .search-wrapper.active {
            width: 300px;
            border-color: var(--neon-blue);
            box-shadow: 0 0 25px rgba(69, 243, 255, 0.3);
            transition: width 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.4s ease, box-shadow 0.4s ease;
        }

        .search-icon {
            min-width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 2;
        }

        .search-icon svg {
            width: 20px;
            height: 20px;
            fill: var(--neon-blue);
            transition: transform 0.3s;
        }

        .search-wrapper:hover .search-icon svg {
            transform: scale(1.1);
        }

        .search-input {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-size: 1rem;
            padding-right: 40px; 
            opacity: 0;
            transition: opacity 0.3s;
            box-sizing: border-box;
        }

        .search-wrapper.active .search-input {
            opacity: 1;
            transition-delay: 0.1s;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .clear-btn {
            position: absolute;
            right: 10px;
            width: 30px; 
            height: 30px;
            color: #888;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.5);
            z-index: 5;
        }

        .clear-btn.visible {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        .clear-btn:hover {
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        /* Contenedor de Proyectos */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            width: 90%;
            max-width: 1200px;
            padding: 40px 0;
        }

        .repo-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s, border-color 0.4s, background-color 0.4s;
            opacity: 0;
            transform: translate3d(0, 40px, 0); 
            animation: cardUp 0.6s forwards;
            position: relative;
            overflow: hidden;
            will-change: transform, opacity;
        }

        .repo-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-blue));
            transition: left 0.5s;
        }

        .repo-card:hover {
            transform: translate3d(0, -8px, 0) scale(1.02);
            box-shadow: 0 15px 40px rgba(176, 38, 255, 0.25);
            border-color: rgba(176, 38, 255, 0.5);
            background: rgba(255, 255, 255, 0.08);
        }

        .repo-card:hover::before {
            left: 100%;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 15px;
            margin-bottom: 15px;
            background: rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
        }

        .active-page { color: var(--neon-cyan); border: 1px solid rgba(0, 250, 154, 0.3); }
        .inactive-page { color: #888; border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .active-page .status-dot { background-color: var(--neon-cyan); box-shadow: 0 0 8px var(--neon-cyan); animation: pulseDot 2s infinite alternate; }
        .inactive-page .status-dot { background-color: #555; }

        @keyframes pulseDot { 0% { opacity: 1; } 100% { opacity: 0.4; } }

        .repo-title { font-size: 1.4rem; margin: 0 0 15px 0; }
        .repo-title a { color: var(--neon-blue); text-decoration: none; transition: color 0.3s; text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 8px rgba(69, 243, 255, 0.4); }
        .repo-title a:hover { color: var(--neon-purple); text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8), 0 0 12px rgba(176, 38, 255, 0.6); }
        
        .repo-desc { 
            color: #e0e0e0; 
            font-size: 0.95rem; 
            line-height: 1.5; 
            margin-bottom: 10px; 
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        @keyframes cardUp { to { opacity: 1; transform: translate3d(0, 0, 0); } }
        @keyframes fadeInUp { to { opacity: 1; transform: translate3d(0, 0, 0); } }

        .empty-message {
            text-align: center;
            width: 100%;
            grid-column: 1 / -1;
            padding: 20px 0;
            display: none;
            animation: fadeInUp 0.5s forwards;
        }

        .empty-message h2 { color: var(--neon-pink); font-size: 1.8rem; text-shadow: 0 2px 4px rgba(0,0,0,0.8), 0 0 15px rgba(255, 42, 133, 0.5); margin: 0 0 10px 0; }
        .empty-message p { color: #aaa; font-size: 1rem; text-shadow: 0 1px 3px rgba(0,0,0,0.8); }

        .section-title {
            width: 90%;
            max-width: 1200px;
            color: var(--neon-cyan);
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(0, 250, 154, 0.3);
            padding-bottom: 10px;
            margin-top: -20px;
            margin-bottom: -20px;
            display: none;
            animation: fadeInUp 0.5s forwards;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .loader {
            border: 4px solid var(--glass-border);
            border-top: 4px solid var(--neon-purple);
            border-radius: 50%;
            width: 40px; height: 40px;
            animation: spin 1s linear infinite;
            margin: 50px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; letter-spacing: 2px; }
            header { margin-top: 30px; }
            .container { grid-template-columns: 1fr; width: 85%; }
            .search-wrapper.active { width: 85vw; max-width: none; }
        }
    </style>
</head>
<body>

    <div id="background-wrapper">
        <div class="orb" id="orb1"></div>
        <div class="orb" id="orb2"></div>
        <div class="orb" id="orb3"></div>
        <div class="orb" id="orb4"></div>
    </div>
    <div class="tint-overlay"></div>

    <div class="main-scroll-wrapper">
        <header>
            <h1>Proyectos xTFEXx</h1>
            
            <div class="search-wrapper" id="search-wrapper">
                <div class="search-icon" id="search-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </div>
                <input type="text" class="search-input" id="search-input" placeholder="Buscar proyecto..." autocomplete="off">
                <span class="clear-btn" id="clear-btn" title="Borrar">&times;</span>
            </div>
        </header>

        <div id="loader" class="loader"></div>
        
        <div class="container" id="repos-container"></div>
        <div class="empty-message" id="empty-message">
            <h2>No se encontraron proyectos</h2>
            <p>Intenta con otras palabras clave.</p>
        </div>
        <h3 class="section-title" id="fallback-title">Proyectos similares</h3>
        <div class="container" id="fallback-container"></div>
    </div>

    <script>
        /* ========================================================================= */
        /* 1. MOTOR DE FÍSICAS DOM (RENDIMIENTO EXTREMO A 60FPS)                     */
        /* ========================================================================= */
        let width, height;
        let tiltX = 0;
        let tiltY = 0;
        let lastWidth = window.innerWidth;
        const isMobile = window.innerWidth <= 768;

        const orbsData = [
            { el: document.getElementById('orb1'), rMulti: isMobile ? 0.65 : 0.35, vx: 0.5, vy: 0.3 },
            { el: document.getElementById('orb2'), rMulti: isMobile ? 0.55 : 0.30, vx: -0.4, vy: -0.6 },
            { el: document.getElementById('orb3'), rMulti: isMobile ? 0.50 : 0.25, vx: -0.6, vy: 0.4 },
            { el: document.getElementById('orb4'), rMulti: isMobile ? 0.45 : 0.20, vx: 0.7, vy: -0.5 }
        ];

        function resize() {
            if (width !== undefined && window.innerWidth === lastWidth && isMobile) return;
            lastWidth = window.innerWidth;
            width = window.innerWidth;
            height = isMobile ? window.screen.height : window.innerHeight;
            
            orbsData.forEach(orb => {
                orb.radius = (orb.rMulti * width) / 2;
                orb.el.style.width = `${orb.radius * 2}px`;
                orb.el.style.height = `${orb.radius * 2}px`;
                if(orb.x === undefined) {
                    orb.x = Math.random() * width;
                    orb.y = Math.random() * height;
                }
            });
        }

        window.addEventListener('resize', resize);
        resize();

        function updateOrbs() {
            orbsData.forEach(orb => {
                // Siempre aplicamos su velocidad base (vx, vy) para que floten desde que entras a la página.
                // Además le sumamos la aceleración del teléfono (tiltX, tiltY).
                orb.x += orb.vx + tiltX;
                orb.y += orb.vy + tiltY;

                // Físicas de teletransporte invertido
                if (orb.x > width + orb.radius) { orb.x = -orb.radius; orb.y = height - orb.y; }
                else if (orb.x < -orb.radius) { orb.x = width + orb.radius; orb.y = height - orb.y; }

                if (orb.y > height + orb.radius) { orb.y = -orb.radius; orb.x = width - orb.x; }
                else if (orb.y < -orb.radius) { orb.y = height + orb.radius; orb.x = width - orb.x; }

                orb.el.style.transform = `translate3d(${orb.x - orb.radius}px, ${orb.y - orb.radius}px, 0)`;
            });
            requestAnimationFrame(updateOrbs);
        }
        requestAnimationFrame(updateOrbs);

        let gyroInitialized = false;

        function handleMotion(event) {
            if (event.accelerationIncludingGravity) {
                let ax = event.accelerationIncludingGravity.x || 0;
                let ay = event.accelerationIncludingGravity.y || 0;
                if (/iPad|iPhone|iPod/.test(navigator.userAgent)) { ax = -ax; ay = -ay; }
                
                // Multiplicador más dócil (1.5) para que no salgan disparadas fuera de pantalla
                tiltX = ax * 1.5; 
                tiltY = -ay * 1.5; 
            }
        }

        function initGyro() {
            if (gyroInitialized) return;
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                DeviceMotionEvent.requestPermission().then(response => {
                    if (response == 'granted') {
                        window.addEventListener('devicemotion', handleMotion);
                        gyroInitialized = true;
                    }
                }).catch(console.error);
            } else {
                window.addEventListener('devicemotion', handleMotion);
                gyroInitialized = true;
            }
        }

        // 1. Lo intentamos activar automáticamente de inmediato (funciona en Android)
        initGyro();
        
        // 2. Por si estás en un iPhone/iOS 13+, dejamos un respaldo en el primer clic de la pantalla
        document.body.addEventListener('click', initGyro, { once: true });


        /* ========================================================================= */
        /* 2. LÓGICA DE LA PÁGINA Y GITHUB API                                       */
        /* ========================================================================= */
        const username = 'xTFEXx';
        const apiUrl = `https://api.github.com/users/${username}/repos`;
        
        const loader = document.getElementById('loader');
        const searchWrapper = document.getElementById('search-wrapper');
        const searchIcon = document.getElementById('search-icon');
        const searchInput = document.getElementById('search-input');
        const clearBtn = document.getElementById('clear-btn');
        
        const mainContainer = document.getElementById('repos-container');
        const emptyMessage = document.getElementById('empty-message');
        const fallbackTitle = document.getElementById('fallback-title');
        const fallbackContainer = document.getElementById('fallback-container');

        let allReposData = [];

        searchIcon.addEventListener('click', () => {
            searchWrapper.classList.toggle('active');
            if(searchWrapper.classList.contains('active')){
                searchInput.focus();
            } else {
                const wasEmpty = searchInput.value.trim() === '';
                searchInput.value = '';
                searchInput.blur();
                clearBtn.classList.remove('visible');
                if (!wasEmpty) performSearch();
            }
        });

        function cleanName(rawName) {
            let name = rawName;
            if (name.includes('-')) {
                name = name.substring(name.indexOf('-') + 1);
                name = name.replace(/-/g, ' ');
                name = name.charAt(0).toUpperCase() + name.slice(1);
            }
            return name;
        }

        function createCardHTML(repo) {
            const displayName = cleanName(repo.name);
            const pageUrl = `https://${username}.github.io/${repo.name}/`;
            const isPageActive = repo.has_pages;
            
            const badgeClass = isPageActive ? 'active-page' : 'inactive-page';
            const badgeText = isPageActive ? 'Activa' : 'Inactiva';
            const desc = repo.description ? repo.description : 'Sin descripción asignada.';

            return `
                <div class="status-badge ${badgeClass}">
                    <span class="status-dot"></span>
                    ${badgeText}
                </div>
                <h2 class="repo-title">
                    <a href="${pageUrl}" target="_blank" rel="noopener noreferrer">${displayName}</a>
                </h2>
                <p class="repo-desc">${desc}</p>
            `;
        }

        function renderCards(repos, container) {
            container.innerHTML = '';
            repos.forEach((repo, index) => {
                const card = document.createElement('div');
                card.className = 'repo-card';
                card.style.animationDelay = `${index * 0.1}s`;
                card.innerHTML = createCardHTML(repo);
                container.appendChild(card);
            });
        }

        function performSearch() {
            const term = searchInput.value.toLowerCase().trim();
            
            if (term.length > 0) clearBtn.classList.add('visible');
            else clearBtn.classList.remove('visible');

            if (term === '') {
                mainContainer.style.display = 'grid';
                emptyMessage.style.display = 'none';
                fallbackTitle.style.display = 'none';
                fallbackContainer.innerHTML = '';
                renderCards(allReposData, mainContainer);
                return;
            }

            const titleMatches = allReposData.filter(repo => cleanName(repo.name).toLowerCase().includes(term));

            if (titleMatches.length > 0) {
                mainContainer.style.display = 'grid';
                emptyMessage.style.display = 'none';
                fallbackTitle.style.display = 'none';
                fallbackContainer.innerHTML = '';
                renderCards(titleMatches, mainContainer);
            } else {
                mainContainer.style.display = 'none';
                emptyMessage.style.display = 'block';
                fallbackTitle.style.display = 'block';

                const descMatches = allReposData.filter(repo => (repo.description || '').toLowerCase().includes(term));

                if (descMatches.length > 0) {
                    fallbackTitle.textContent = "Proyectos similares";
                    renderCards(descMatches, fallbackContainer);
                } else {
                    fallbackTitle.textContent = "Otros proyectos";
                    const randomRepos = [...allReposData].sort(() => 0.5 - Math.random()).slice(0, 3);
                    renderCards(randomRepos, fallbackContainer);
                }
            }
        }

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            searchInput.focus();
            performSearch();
        });

        searchInput.addEventListener('input', performSearch);

        async function fetchRepos() {
            try {
                const response = await fetch(apiUrl, { cache: 'no-store' });
                if (!response.ok) throw new Error('Error al cargar la API de GitHub');
                allReposData = await response.json();

                loader.style.display = 'none';
                renderCards(allReposData, mainContainer);

            } catch (error) {
                console.error('Error:', error);
                loader.style.display = 'none';
                mainContainer.innerHTML = `<p style="color: #ff4545; text-align: center; width: 100%;">Error al establecer conexión con los repositorios.</p>`;
            }
        }

        fetchRepos();
    </script>
</body>
</html>
